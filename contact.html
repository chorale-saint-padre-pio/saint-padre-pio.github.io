<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Contact Chorale Saint Padre Pio: Get in touch with us.">
  <meta name="theme-color" content="#ffffff">
  <title>Contact | Chorale Saint Padre Pio</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="images/favicon.png">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <div class="page-hero-img" id="contact-hero-img" style="background-image:url('images/contact-bg.jpg');"></div>
    <div class="page-hero-fallback" id="contact-hero-fallback"></div>
    <div class="page-hero-overlay"></div>
    <svg style="position:absolute;right:8%;bottom:12%;opacity:0.06;pointer-events:none;" width="140" height="140" viewBox="0 0 24 24" fill="white" stroke="none"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6" stroke="white" fill="none" stroke-width="2"/></svg>
    <div class="container page-hero-content">
      <div class="section-label"><span class="label" data-i18n="contact_hero_label"></span></div>
      <h1 data-i18n="contact_hero_heading"></h1>
      <p data-i18n="contact_hero_body"></p>
    </div>
  </div>

  <!-- CONTACT MAIN beige bg -->
  <section class="bg-beige-warm">
    <div class="container">
      <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:clamp(36px,6vw,72px);align-items:start;" id="contact-grid">

        <!-- LEFT: Info card -->
        <div class="reveal">
          <div class="section-label left"><span class="label" data-i18n="contact_info_label"></span></div>
          <h2 style="margin-top:12px;font-size:clamp(1.5rem,3vw,2.2rem);" data-i18n="contact_hero_heading"></h2>
          <div class="deco-line left"></div>

          <div class="contact-info-card" style="margin-top:24px;">
            <div class="contact-info-item">
              <div class="contact-info-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </div>
              <div class="contact-info-text">
                <label data-i18n="contact_email_label"></label>
                <span data-contact="email"></span>
              </div>
            </div>
            <div class="contact-info-item">
              <div class="contact-info-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.43 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.13 6.13l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              </div>
              <div class="contact-info-text">
                <label data-i18n="contact_phone_label"></label>
                <span data-contact="phone"></span>
              </div>
            </div>
            <div class="contact-info-item">
              <div class="contact-info-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              </div>
              <div class="contact-info-text">
                <label data-i18n="contact_location_label"></label>
                <span data-contact="address"></span>
              </div>
            </div>
            <div class="contact-info-item">
              <div class="contact-info-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </div>
              <div class="contact-info-text">
                <label data-i18n="contact_rehearsal_label"></label>
                <span data-contact="rehearsal"></span>
              </div>
            </div>
          </div>

          <!-- Social links -->
          <div style="margin-top:26px;">
            <div style="font-size:0.65rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:12px;" data-i18n="footer_follow"></div>
            <div style="display:flex;gap:10px;">
              <a href="#" data-social="facebook" aria-label="Facebook" style="width:44px;height:44px;border-radius:50%;background:var(--glass-bg-strong);backdrop-filter:blur(16px);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;color:var(--blue-primary);transition:all 0.28s;box-shadow:var(--glass-shadow);" onmouseover="this.style.background='var(--blue-primary)';this.style.color='white';" onmouseout="this.style.background='var(--glass-bg-strong)';this.style.color='var(--blue-primary)';">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
              </a>
              <a href="#" data-social="youtube" aria-label="YouTube" style="width:44px;height:44px;border-radius:50%;background:var(--glass-bg-strong);backdrop-filter:blur(16px);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;color:var(--blue-primary);transition:all 0.28s;box-shadow:var(--glass-shadow);" onmouseover="this.style.background='var(--blue-primary)';this.style.color='white';" onmouseout="this.style.background='var(--glass-bg-strong)';this.style.color='var(--blue-primary)';">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58a2.78 2.78 0 0 0 1.95 1.95C5.12 20 12 20 12 20s6.88 0 8.59-.47a2.78 2.78 0 0 0 1.95-1.95A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58zM9.75 15.02V8.98L15.5 12l-5.75 3.02z"/></svg>
              </a>
              <a href="#" data-social="instagram" aria-label="Instagram" style="width:44px;height:44px;border-radius:50%;background:var(--glass-bg-strong);backdrop-filter:blur(16px);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;color:var(--blue-primary);transition:all 0.28s;box-shadow:var(--glass-shadow);" onmouseover="this.style.background='var(--blue-primary)';this.style.color='white';" onmouseout="this.style.background='var(--glass-bg-strong)';this.style.color='var(--blue-primary)';">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
              </a>
            </div>
          </div>

          <!-- Map placeholder (replace with Google Maps embed) -->
          <div class="map-frame reveal" style="margin-top:24px;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--beige-dark)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <p>Kampala, Uganda<br><span style="font-size:0.72rem;color:var(--beige-dark);">Replace this block with a Google Maps &lt;iframe&gt;</span></p>
          </div>
        </div>

        <!-- RIGHT: Contact form -->
        <div class="card reveal reveal-delay-1" style="padding:clamp(22px,4vw,44px);">
          <h3 style="color:var(--ink);margin-bottom:22px;" data-i18n="contact_form_heading"></h3>
          <form class="js-form" novalidate>
            <div class="form-group">
              <label data-i18n="contact_form_name"></label>
              <input type="text" data-i18n-placeholder="contact_form_name" required>
            </div>
            <div class="form-group">
              <label data-i18n="contact_form_email"></label>
              <input type="email" data-i18n-placeholder="contact_form_email" required>
            </div>
            <div class="form-group">
              <label data-i18n="contact_form_subject"></label>
              <input type="text" data-i18n-placeholder="contact_form_subject">
            </div>
            <div class="form-group">
              <label data-i18n="contact_form_message"></label>
              <textarea data-i18n-placeholder="contact_form_message" style="min-height:140px;"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              <span data-i18n="contact_form_submit"></span>
            </button>
            <div class="form-success" data-i18n="contact_form_success"></div>
          </form>
        </div>

      </div>
    </div>
  </section>

  <!-- BOTTOM CTA -->
  <section class="cta-band">
    <div class="container">
      <h2 class="reveal" data-i18n="join_heading"></h2>
      <p class="reveal reveal-delay-1" data-i18n="join_body"></p>
      <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;" class="reveal reveal-delay-2">
        <a href="join.html" class="btn btn-white" data-i18n="join_cta"></a>
        <a href="events.html" class="btn btn-outline" style="border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.88);" data-i18n="nav_events"></a>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="js/translations.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function(){
      var img=new Image();
      img.onerror=function(){document.getElementById('contact-hero-img').style.display='none';};
      img.onload=function(){document.getElementById('contact-hero-fallback').style.display='none';};
      img.src='images/contact-bg.jpg';
    })();
  </script>
  <style>
    @media(max-width:768px){ #contact-grid{grid-template-columns:1fr!important;} }
  </style>
</body>
</html>
