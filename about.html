<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Chorale Saint Padre Pio: Sacred music choir in Kampala, Uganda.">
  <meta property="og:title" content="Chorale Saint Padre Pio">
  <meta name="theme-color" content="#ffffff">
  <title>Chorale Saint Padre Pio</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="images/favicon.png">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <!-- HERO -->
  <section class="hero" aria-label="Hero">
    <div class="hero-img-bg" id="hero-bg-img" style="display:none;"></div>
    <div class="hero-img-overlay" id="hero-overlay" style="display:none;"></div>
    <div class="hero-fallback-bg" id="hero-fallback"></div>
    <div class="hero-shapes" id="hero-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
    <svg style="position:absolute;right:6%;top:18%;opacity:0.05;pointer-events:none;" width="120" height="120" viewBox="0 0 24 24" fill="var(--blue-primary)" stroke="none"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <svg style="position:absolute;left:4%;bottom:22%;opacity:0.05;pointer-events:none;" width="80" height="80" viewBox="0 0 24 24" fill="var(--beige-warm)" stroke="none"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>

    <div class="hero-content" id="hero-content">
      <div class="hero-tagline reveal">
        <span class="hero-tagline-line"></span>
        <span data-i18n="hero_tagline"></span>
        <span class="hero-tagline-line"></span>
      </div>
      <!-- Small italic phrase above buttons -->
      <p class="hero-motto reveal reveal-delay-1"><em>Singing for the Glory of God</em></p>
      <!-- Spacer to push buttons down -->
      <div style="height:clamp(40px,8vw,80px);"></div>
      <div class="hero-ctas reveal reveal-delay-2">
        <a href="about.html" class="btn btn-primary" data-i18n="hero_cta_primary"></a>
        <a href="events.html" class="btn btn-ghost" data-i18n="hero_cta_secondary"></a>
      </div>
    </div>
    <div class="hero-scroll" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
    </div>
  </section>

  <!-- STATS BAR -->
  <div class="container" style="margin-top:-32px;position:relative;z-index:10;">
    <div class="stats-bar reveal">
      <div class="stat-item">
        <span class="stat-number" data-stat="stat_years" data-target="12" data-suffix="+">12+</span>
        <span class="stat-label" data-i18n="stat_years"></span>
      </div>
      <div class="stat-item">
        <span class="stat-number" data-stat="stat_members" data-target="52">52</span>
        <span class="stat-label" data-i18n="stat_members"></span>
      </div>
      <div class="stat-item">
        <span class="stat-number" data-stat="stat_events" data-target="24">24</span>
        <span class="stat-label" data-i18n="stat_events"></span>
      </div>
      <div class="stat-item">
        <span class="stat-number" data-stat="stat_parishes" data-target="6">6</span>
        <span class="stat-label" data-i18n="stat_parishes"></span>
      </div>
    </div>
  </div>

  <!-- ABOUT TEASER -->
  <section class="bg-white">
    <div class="container">
      <div class="split">
        <div class="split-text">
          <div class="section-label left reveal"><span class="label" data-i18n="about_label"></span></div>
          <h2 class="reveal reveal-delay-1" data-i18n="about_heading"></h2>
          <div class="deco-line left reveal reveal-delay-1"></div>
          <p class="reveal reveal-delay-2" data-i18n="about_body"></p>
          <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:28px;" class="reveal reveal-delay-3">
            <a href="about.html" class="btn btn-primary" data-i18n="about_cta"></a>
            <a href="about.html" class="btn btn-outline" data-i18n="about_link"></a>
          </div>
        </div>
        <div class="reveal reveal-delay-2" style="position:relative;">
          <div class="photo-panel" style="aspect-ratio:4/5;">
            <img src="images/about-choir.jpg" alt="Chorale Saint Padre Pio"
              style="width:100%;height:100%;object-fit:cover;"
              onerror="this.parentElement.style.display='none';this.parentElement.nextElementSibling.style.display='flex';">
          </div>
          <div class="photo-panel-placeholder" style="display:none;aspect-ratio:4/5;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--beige-dark)" stroke-width="1.2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            <p>Add <strong>images/about-choir.jpg</strong></p>
          </div>
          <div class="photo-badge" style="bottom:-18px;left:-18px;">
            <span class="photo-badge-number">12+</span>
            <span class="photo-badge-label" data-i18n="stat_years"></span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- EVENTS TEASER -->
  <section class="bg-gradient-beige">
    <div class="container">
      <div class="split">
        <div class="reveal" style="position:relative;order:2;">
          <div class="photo-panel" style="aspect-ratio:3/4;">
            <img src="images/events-stage.jpg" alt="Choir performance"
              style="width:100%;height:100%;object-fit:cover;"
              onerror="this.parentElement.style.display='none';this.parentElement.nextElementSibling.style.display='flex';">
          </div>
          <div class="photo-panel-placeholder" style="display:none;aspect-ratio:3/4;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--beige-dark)" stroke-width="1.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <p>Add <strong>images/events-stage.jpg</strong></p>
          </div>
        </div>
        <div class="split-text" style="order:1;">
          <div class="section-label left reveal"><span class="label" data-i18n="events_label"></span></div>
          <h2 class="reveal reveal-delay-1" data-i18n="events_heading"></h2>
          <div class="deco-line left reveal reveal-delay-1"></div>
          <!-- Dynamic first event from content.js -->
          <div id="homepage-event-teaser" class="reveal reveal-delay-2"></div>
          <p class="reveal reveal-delay-2" data-i18n="events_body"></p>
          <div style="margin-top:22px;" class="reveal reveal-delay-3">
            <a href="events.html" class="btn btn-primary" data-i18n="events_cta"></a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- JOIN CTA -->
  <section class="cta-band">
    <div class="container">
      <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:100px;padding:7px 18px;margin-bottom:20px;" class="reveal">
        <span class="label" style="color:rgba(255,255,255,0.65);" data-i18n="join_label"></span>
      </div>
      <h2 class="reveal reveal-delay-1" data-i18n="join_heading"></h2>
      <p class="reveal reveal-delay-2" data-i18n="join_body"></p>
      <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;" class="reveal reveal-delay-3">
        <a href="join.html" class="btn btn-white" data-i18n="join_cta"></a>
        <a href="join.html" class="btn btn-outline" style="border-color:rgba(255,255,255,0.38);color:rgba(255,255,255,0.85);" data-i18n="join_link"></a>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="js/translations.js"></script>
  <script src="js/content.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function(){
      var img = new Image();
      img.onload = function(){
        document.getElementById('hero-bg-img').style.cssText = 'display:block;background-image:url("images/hero-bg.jpg")';
        document.getElementById('hero-overlay').style.display = 'block';
        document.getElementById('hero-fallback').style.display = 'none';
        document.getElementById('hero-shapes').style.display = 'none';
        document.getElementById('hero-content').classList.add('on-photo');
      };
      img.src = 'images/hero-bg.jpg';
    })();
  </script>
</body>
</html>
