<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Join Chorale Saint Padre Pio — Become part of our sacred music family.">
  <title>Join Us — Chorale Saint Padre Pio</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <div class="page-hero-bg"></div>
    <div class="page-hero-overlay"></div>
    <div style="position:absolute;right:8%;bottom:10%;font-size:10rem;opacity:0.04;color:white;pointer-events:none;user-select:none;">🎙️</div>
    <div class="container page-hero-content">
      <div class="section-label">
        <span class="label" data-i18n="join_hero_label"></span>
      </div>
      <h1 data-i18n="join_hero_heading"></h1>
      <p data-i18n="join_hero_body"></p>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       WHY JOIN — PERKS
  ════════════════════════════════════════ -->
  <section style="background:var(--white);">
    <div class="container">
      <div style="max-width:560px;margin:0 auto 56px;text-align:center;" class="reveal">
        <div class="section-label" style="justify-content:center;">
          <span class="label" data-i18n="join_why_label"></span>
        </div>
        <h2 style="margin-top:12px;" data-i18n="join_why_heading"></h2>
        <div class="deco-line" style="margin:16px auto;"></div>
      </div>
      <div class="perks-grid">
        <div class="perk-card reveal">
          <div class="perk-icon">🙏</div>
          <h4 data-i18n="join_perk1_title"></h4>
          <p data-i18n="join_perk1_body"></p>
        </div>
        <div class="perk-card reveal reveal-delay-1">
          <div class="perk-icon">🤝</div>
          <h4 data-i18n="join_perk2_title"></h4>
          <p data-i18n="join_perk2_body"></p>
        </div>
        <div class="perk-card reveal reveal-delay-2">
          <div class="perk-icon">🎤</div>
          <h4 data-i18n="join_perk3_title"></h4>
          <p data-i18n="join_perk3_body"></p>
        </div>
        <div class="perk-card reveal reveal-delay-3">
          <div class="perk-icon">⛪</div>
          <h4 data-i18n="join_perk4_title"></h4>
          <p data-i18n="join_perk4_body"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- ════════════════════════════════════════
       STEPS
  ════════════════════════════════════════ -->
  <section style="background:linear-gradient(160deg,var(--blue-ghost),var(--beige-pale));">
    <div class="container">
      <div style="max-width:560px;margin:0 auto 56px;text-align:center;" class="reveal">
        <div class="section-label" style="justify-content:center;">
          <span class="label" data-i18n="join_process_label"></span>
        </div>
        <h2 style="margin-top:12px;" data-i18n="join_process_heading"></h2>
        <div class="deco-line" style="margin:16px auto;"></div>
      </div>
      <div class="steps">
        <div class="step reveal">
          <div class="step-number">1</div>
          <h4 data-i18n="step1_title"></h4>
          <p data-i18n="step1_body"></p>
        </div>
        <div class="step reveal reveal-delay-1">
          <div class="step-number">2</div>
          <h4 data-i18n="step2_title"></h4>
          <p data-i18n="step2_body"></p>
        </div>
        <div class="step reveal reveal-delay-2">
          <div class="step-number">3</div>
          <h4 data-i18n="step3_title"></h4>
          <p data-i18n="step3_body"></p>
        </div>
      </div>

      <!-- Rehearsal info box -->
      <div style="margin-top:48px;padding:32px 40px;background:var(--glass-bg-strong);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius-lg);box-shadow:var(--glass-shadow);display:flex;align-items:center;gap:32px;flex-wrap:wrap;" class="reveal">
        <div style="font-size:2.5rem;">📅</div>
        <div>
          <h4 style="color:var(--ink);margin-bottom:4px;">Weekly Rehearsals</h4>
          <p style="font-size:0.9rem;margin:0;" data-i18n="contact_rehearsal_value"></p>
          <p style="font-size:0.85rem;color:var(--ink-muted);margin-top:4px;">Open to all — first session is free, no commitment required.</p>
        </div>
        <a href="contact.html" class="btn btn-primary" style="margin-left:auto;" data-i18n="nav_contact"></a>
      </div>
    </div>
  </section>

  <!-- ════════════════════════════════════════
       INTEREST FORM
  ════════════════════════════════════════ -->
  <section style="background:var(--white);">
    <div class="container">
      <div style="display:grid;grid-template-columns:1fr 1.2fr;gap:clamp(40px,6vw,80px);align-items:start;" class="split-form">
        <!-- Left: info -->
        <div class="reveal">
          <div class="section-label">
            <span class="label" data-i18n="join_form_heading"></span>
          </div>
          <h2 style="margin-top:12px;" data-i18n="join_heading"></h2>
          <div class="deco-line"></div>
          <p data-i18n="join_body"></p>

          <div style="margin-top:32px;display:flex;flex-direction:column;gap:16px;">
            <div style="display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--blue-ghost);border-radius:var(--radius-md);border:1px solid var(--glass-border-blue);">
              <span style="font-size:1.3rem;">🎵</span>
              <div>
                <div style="font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue-primary);">Voice Types Welcome</div>
                <div style="font-size:0.9rem;color:var(--ink-soft);">Soprano · Alto · Tenor · Bass</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--beige-pale);border-radius:var(--radius-md);border:1px solid rgba(212,197,173,0.3);">
              <span style="font-size:1.3rem;">✅</span>
              <div>
                <div style="font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue-primary);">No Audition Required</div>
                <div style="font-size:0.9rem;color:var(--ink-soft);">Open heart is all you need</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--blue-ghost);border-radius:var(--radius-md);border:1px solid var(--glass-border-blue);">
              <span style="font-size:1.3rem;">📅</span>
              <div>
                <div style="font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue-primary);">Rehearsals</div>
                <div style="font-size:0.9rem;color:var(--ink-soft);" data-i18n="contact_rehearsal_value"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: form -->
        <div class="card reveal reveal-delay-1" style="padding:clamp(24px,4vw,48px);">
          <h3 style="color:var(--ink);margin-bottom:24px;" data-i18n="join_form_heading"></h3>
          <form class="js-form" novalidate>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
              <div class="form-group" style="grid-column:1/-1;">
                <label data-i18n="join_form_name"></label>
                <input type="text" data-i18n-placeholder="join_form_name" required>
              </div>
              <div class="form-group">
                <label data-i18n="join_form_email"></label>
                <input type="email" data-i18n-placeholder="join_form_email" required>
              </div>
              <div class="form-group">
                <label data-i18n="join_form_phone"></label>
                <input type="tel" data-i18n-placeholder="join_form_phone">
              </div>
              <div class="form-group" style="grid-column:1/-1;">
                <label data-i18n="join_form_voice"></label>
                <input type="text" data-i18n-placeholder="join_form_voice_placeholder">
              </div>
              <div class="form-group" style="grid-column:1/-1;">
                <label data-i18n="join_form_message"></label>
                <textarea data-i18n-placeholder="join_form_message"></textarea>
              </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
              <span data-i18n="join_form_submit"></span>
            </button>
            <div class="form-success" data-i18n="join_form_success"></div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="js/translations.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <style>
    @media(max-width:768px){
      .split-form{grid-template-columns:1fr!important;}
    }
  </style>
</body>
</html>
