<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Join Chorale Saint Padre Pio: Become part of our sacred music family.">
  <meta name="theme-color" content="#ffffff">
  <title>Join Us | Chorale Saint Padre Pio</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="images/favicon.png">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <div class="page-hero-img" id="join-hero-img" style="background-image:url('images/join-rehearsal.jpg');"></div>
    <div class="page-hero-fallback" id="join-hero-fallback"></div>
    <div class="page-hero-overlay"></div>
    <svg style="position:absolute;right:8%;bottom:12%;opacity:0.06;pointer-events:none;" width="140" height="140" viewBox="0 0 24 24" fill="white" stroke="none"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    <div class="container page-hero-content">
      <div class="section-label"><span class="label" data-i18n="join_hero_label"></span></div>
      <h1 data-i18n="join_hero_heading"></h1>
      <p data-i18n="join_hero_body"></p>
    </div>
  </div>

  <!-- WHY JOIN white bg -->
  <section class="bg-white">
    <div class="container">
      <div style="text-align:center;max-width:540px;margin:0 auto 52px;" class="reveal">
        <div class="section-label"><span class="label" data-i18n="join_why_label"></span></div>
        <h2 style="margin-top:12px;" data-i18n="join_why_heading"></h2>
        <div class="deco-line"></div>
      </div>
      <div class="perks-grid">
        <div class="perk-card reveal">
          <div class="perk-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2l-6 6-6-6"/><path d="M12 8v13"/><path d="M5 3l-.5 5.5A2.5 2.5 0 0 0 7 11h0a2.5 2.5 0 0 0 2.5-2.5V8"/><path d="M19 3l.5 5.5A2.5 2.5 0 0 1 17 11h0a2.5 2.5 0 0 1-2.5-2.5V8"/></svg>
          </div>
          <h4 data-i18n="join_perk1_title"></h4>
          <p data-i18n="join_perk1_body"></p>
        </div>
        <div class="perk-card reveal reveal-delay-1">
          <div class="perk-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <h4 data-i18n="join_perk2_title"></h4>
          <p data-i18n="join_perk2_body"></p>
        </div>
        <div class="perk-card reveal reveal-delay-2">
          <div class="perk-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </div>
          <h4 data-i18n="join_perk3_title"></h4>
          <p data-i18n="join_perk3_body"></p>
        </div>
        <div class="perk-card reveal reveal-delay-3">
          <div class="perk-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 22H6a2 2 0 0 1-2-2V12"/><path d="m18 22 4-4"/><path d="m2 12 4 4"/><path d="M12 22V8"/><path d="m9 5 3-3 3 3"/><path d="M4 12a8 8 0 0 1 16 0"/></svg>
          </div>
          <h4 data-i18n="join_perk4_title"></h4>
          <p data-i18n="join_perk4_body"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- STEPS beige bg -->
  <section class="bg-beige">
    <div class="container">
      <div style="text-align:center;max-width:540px;margin:0 auto 52px;" class="reveal">
        <div class="section-label"><span class="label" data-i18n="join_process_label"></span></div>
        <h2 style="margin-top:12px;" data-i18n="join_process_heading"></h2>
        <div class="deco-line"></div>
      </div>
      <div class="steps">
        <div class="step reveal">
          <div class="step-number">1</div>
          <h4 data-i18n="step1_title"></h4>
          <p data-i18n="step1_body"></p>
        </div>
        <div class="step reveal reveal-delay-1">
          <div class="step-number">2</div>
          <h4 data-i18n="step2_title"></h4>
          <p data-i18n="step2_body"></p>
        </div>
        <div class="step reveal reveal-delay-2">
          <div class="step-number">3</div>
          <h4 data-i18n="step3_title"></h4>
          <p data-i18n="step3_body"></p>
        </div>
      </div>

      <!-- Rehearsal info box -->
      <div style="margin-top:40px;padding:28px 36px;background:var(--glass-bg-strong);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius-lg);box-shadow:var(--glass-shadow);display:flex;align-items:center;gap:24px;flex-wrap:wrap;" class="reveal">
        <div style="width:52px;height:52px;border-radius:var(--radius-md);background:linear-gradient(135deg,var(--blue-primary),var(--blue-mid));display:flex;align-items:center;justify-content:center;color:white;flex-shrink:0;box-shadow:0 4px 14px rgba(74,144,164,0.35);">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div style="flex:1;min-width:160px;">
          <h4 style="color:var(--ink);margin-bottom:3px;">Weekly Rehearsals</h4>
          <p style="font-size:0.9rem;margin:0;" data-i18n="contact_rehearsal_value"></p>
          <p style="font-size:0.82rem;color:var(--ink-muted);margin-top:3px;">First session free, no commitment required.</p>
        </div>
        <a href="contact.html" class="btn btn-primary" data-i18n="nav_contact"></a>
      </div>
    </div>
  </section>

  <!-- INTEREST FORM white bg -->
  <section class="bg-white">
    <div class="container">
      <div style="display:grid;grid-template-columns:1fr 1.2fr;gap:clamp(36px,6vw,72px);align-items:start;" id="join-form-grid">

        <!-- Left info -->
        <div class="reveal">
          <div class="section-label left"><span class="label" data-i18n="join_form_heading"></span></div>
          <h2 style="margin-top:12px;" data-i18n="join_heading"></h2>
          <div class="deco-line left"></div>
          <p data-i18n="join_body"></p>

          <div style="margin-top:28px;display:flex;flex-direction:column;gap:12px;">
            <div style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--blue-ghost);border-radius:var(--radius-md);border:1px solid var(--glass-border-blue);">
              <div style="width:40px;height:40px;border-radius:var(--radius-sm);background:var(--blue-pale);display:flex;align-items:center;justify-content:center;color:var(--blue-primary);flex-shrink:0;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
              </div>
              <div>
                <div style="font-size:0.68rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue-primary);">Voice Types Welcome</div>
                <div style="font-size:0.88rem;color:var(--ink-soft);">Soprano · Alto · Tenor · Bass</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--beige-pale);border-radius:var(--radius-md);border:1px solid var(--glass-border-beige);">
              <div style="width:40px;height:40px;border-radius:var(--radius-sm);background:var(--beige-light);display:flex;align-items:center;justify-content:center;color:var(--blue-primary);flex-shrink:0;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <div>
                <div style="font-size:0.68rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue-primary);">No Audition Required</div>
                <div style="font-size:0.88rem;color:var(--ink-soft);">Open heart is all you need</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--blue-ghost);border-radius:var(--radius-md);border:1px solid var(--glass-border-blue);">
              <div style="width:40px;height:40px;border-radius:var(--radius-sm);background:var(--blue-pale);display:flex;align-items:center;justify-content:center;color:var(--blue-primary);flex-shrink:0;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </div>
              <div>
                <div style="font-size:0.68rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue-primary);">Rehearsals</div>
                <div style="font-size:0.88rem;color:var(--ink-soft);" data-contact="rehearsal"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Form -->
        <div class="card reveal reveal-delay-1" style="padding:clamp(22px,4vw,44px);">
          <h3 style="color:var(--ink);margin-bottom:22px;" data-i18n="join_form_heading"></h3>
          <form class="js-form" novalidate>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
              <div class="form-group" style="grid-column:1/-1;">
                <label data-i18n="join_form_name"></label>
                <input type="text" data-i18n-placeholder="join_form_name" required>
              </div>
              <div class="form-group">
                <label data-i18n="join_form_email"></label>
                <input type="email" data-i18n-placeholder="join_form_email" required>
              </div>
              <div class="form-group">
                <label data-i18n="join_form_phone"></label>
                <input type="tel" data-i18n-placeholder="join_form_phone">
              </div>
              <div class="form-group" style="grid-column:1/-1;">
                <label data-i18n="join_form_voice"></label>
                <input type="text" data-i18n-placeholder="join_form_voice_placeholder">
              </div>
              <div class="form-group" style="grid-column:1/-1;">
                <label data-i18n="join_form_message"></label>
                <textarea data-i18n-placeholder="join_form_message"></textarea>
              </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              <span data-i18n="join_form_submit"></span>
            </button>
            <div class="form-success" data-i18n="join_form_success"></div>
          </form>
        </div>

      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="js/translations.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function(){
      var img=new Image();
      img.onerror=function(){document.getElementById('join-hero-img').style.display='none';};
      img.onload=function(){document.getElementById('join-hero-fallback').style.display='none';};
      img.src='images/join-rehearsal.jpg';
    })();
  </script>
  <style>
    @media(max-width:768px){ #join-form-grid{grid-template-columns:1fr!important;} }
  </style>
</body>
</html>
