<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chorale Saint Padre Pio — Sacred music choir in Kampala, Uganda. Singing in faith and harmony.">
  <meta property="og:title" content="Chorale Saint Padre Pio">
  <meta property="og:description" content="A voice lifted in faith and harmony — sacred choir from Kampala, Uganda.">
  <title>Chorale Saint Padre Pio</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>
<body>

  <!-- Navbar injected by components.js -->
  <div id="navbar-placeholder"></div>

  <!-- ════════════════════════════════════════
       HERO
  ════════════════════════════════════════ -->
  <section class="hero" aria-label="Hero">
    <div class="hero-bg"></div>
    <div class="hero-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>

    <!-- Decorative musical note watermarks -->
    <div style="position:absolute;right:8%;top:15%;font-size:8rem;opacity:0.04;font-family:serif;pointer-events:none;user-select:none;">♪</div>
    <div style="position:absolute;left:5%;bottom:25%;font-size:5rem;opacity:0.05;font-family:serif;pointer-events:none;user-select:none;">♫</div>
    <div style="position:absolute;right:22%;bottom:15%;font-size:4rem;opacity:0.04;font-family:serif;pointer-events:none;user-select:none;">♩</div>

    <!-- Decorative glass orb image area -->
    <div style="position:absolute;right:clamp(20px,6vw,80px);top:50%;transform:translateY(-50%);pointer-events:none;" aria-hidden="true">
      <div style="width:clamp(200px,28vw,400px);height:clamp(200px,28vw,400px);border-radius:50%;background:linear-gradient(135deg,rgba(74,144,164,0.18),rgba(184,217,227,0.3));backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;box-shadow:0 20px 80px rgba(74,144,164,0.2);">
        <div style="font-size:clamp(4rem,8vw,7rem);opacity:0.6;filter:drop-shadow(0 4px 12px rgba(26,61,79,0.2));">🎶</div>
      </div>
      <!-- smaller satellite orb -->
      <div style="position:absolute;bottom:-30px;left:-40px;width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,rgba(212,197,173,0.6),rgba(237,228,214,0.4));backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.6);box-shadow:0 8px 32px rgba(26,61,79,0.1);"></div>
      <div style="position:absolute;top:-20px;right:-20px;width:60px;height:60px;border-radius:50%;background:rgba(74,144,164,0.2);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.5);"></div>
    </div>

    <div class="container hero-content" style="padding-top:72px;">
      <div style="max-width:580px;">
        <div class="section-label reveal">
          <span class="label" data-i18n="hero_tagline"></span>
        </div>
        <h1 style="margin-top:16px;color:var(--blue-deep);" class="reveal reveal-delay-1">
          <span data-i18n="hero_heading"></span>
        </h1>
        <p style="max-width:460px;margin-top:20px;font-size:1.05rem;" class="reveal reveal-delay-2" data-i18n="hero_subheading"></p>
        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:36px;" class="reveal reveal-delay-3">
          <a href="about.html" class="btn btn-primary" data-i18n="hero_cta_primary"></a>
          <a href="events.html" class="btn btn-ghost" data-i18n="hero_cta_secondary"></a>
        </div>
        <!-- Trust indicator -->
        <div style="display:flex;align-items:center;gap:12px;margin-top:40px;" class="reveal reveal-delay-4">
          <div style="display:flex;">
            <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue-light),var(--blue-primary));border:2px solid white;margin-right:-8px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:white;">♪</div>
            <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--beige-mid),var(--beige-light));border:2px solid white;margin-right:-8px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;">♫</div>
            <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue-pale),var(--blue-light));border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:var(--blue-deep);">♩</div>
          </div>
          <span style="font-size:0.8rem;color:var(--ink-muted);">50+ voices · Kampala, Uganda</span>
        </div>
      </div>
    </div>
  </section>

  <!-- ════════════════════════════════════════
       STATS BAR
  ════════════════════════════════════════ -->
  <div class="container" style="margin-top:-32px;position:relative;z-index:10;">
    <div class="stats-bar reveal">
      <div class="stat-item">
        <span class="stat-number" data-target="12" data-suffix="+">0</span>
        <span class="stat-label" data-i18n="stat_years"></span>
      </div>
      <div class="stat-item">
        <span class="stat-number" data-target="52">0</span>
        <span class="stat-label" data-i18n="stat_members"></span>
      </div>
      <div class="stat-item">
        <span class="stat-number" data-target="24">0</span>
        <span class="stat-label" data-i18n="stat_events"></span>
      </div>
      <div class="stat-item">
        <span class="stat-number" data-target="6">0</span>
        <span class="stat-label" data-i18n="stat_parishes"></span>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       ABOUT TEASER
  ════════════════════════════════════════ -->
  <section style="background:var(--white);">
    <div class="container">
      <div class="split">
        <div>
          <div class="section-label reveal">
            <span class="label" data-i18n="about_label"></span>
          </div>
          <h2 style="margin-top:12px;" class="reveal reveal-delay-1" data-i18n="about_heading"></h2>
          <div class="deco-line reveal reveal-delay-1"></div>
          <p class="reveal reveal-delay-2" data-i18n="about_body"></p>
          <div style="display:flex;align-items:center;gap:20px;margin-top:28px;" class="reveal reveal-delay-3">
            <a href="about.html" class="btn btn-primary" data-i18n="about_cta"></a>
            <a href="about.html" class="btn btn-outline" data-i18n="about_link"></a>
          </div>
        </div>
        <div class="reveal reveal-delay-2" style="position:relative;">
          <!-- Decorative glass image panel -->
          <div style="border-radius:var(--radius-xl);overflow:hidden;background:linear-gradient(135deg,var(--blue-ghost),var(--beige-pale));height:420px;display:flex;align-items:center;justify-content:center;box-shadow:var(--glass-shadow-lg);border:1px solid var(--glass-border);">
            <div style="text-align:center;">
              <div style="font-size:5rem;opacity:0.35;filter:drop-shadow(0 4px 20px rgba(74,144,164,0.3));">🎵</div>
              <p style="color:var(--blue-light);font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;margin-top:8px;">Chorale Saint Padre Pio</p>
            </div>
          </div>
          <!-- Floating glass card -->
          <div style="position:absolute;bottom:-20px;left:-20px;padding:20px 24px;background:var(--glass-bg-strong);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius-md);box-shadow:var(--glass-shadow);min-width:180px;">
            <div style="font-size:1.8rem;font-family:var(--font-display);font-weight:300;color:var(--blue-primary);">12+</div>
            <div style="font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted);" data-i18n="stat_years"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ════════════════════════════════════════
       EVENTS TEASER
  ════════════════════════════════════════ -->
  <section style="background:linear-gradient(160deg,var(--blue-ghost),var(--beige-pale));">
    <div class="container">
      <div class="split reverse">
        <div>
          <div class="section-label reveal">
            <span class="label" data-i18n="events_label"></span>
          </div>
          <h2 style="margin-top:12px;" class="reveal reveal-delay-1" data-i18n="events_heading"></h2>
          <div class="deco-line reveal reveal-delay-1"></div>

          <!-- Sample event card -->
          <div class="event-card reveal reveal-delay-2" style="margin-top:24px;margin-bottom:24px;">
            <div class="event-date-block">
              <span class="day">15</span>
              <span class="month">Aug</span>
            </div>
            <div class="event-info">
              <h3 style="font-size:1.1rem;">Concert de la Fête de l'Assomption</h3>
              <div class="event-meta">
                <span>🕖 6:00 PM</span>
                <span>📍 Cathédrale de Kampala</span>
              </div>
            </div>
          </div>

          <p class="reveal reveal-delay-2" data-i18n="events_body"></p>
          <div style="margin-top:24px;" class="reveal reveal-delay-3">
            <a href="events.html" class="btn btn-primary" data-i18n="events_cta"></a>
          </div>
        </div>

        <div class="reveal" style="position:relative;">
          <div style="border-radius:var(--radius-xl);overflow:hidden;background:linear-gradient(135deg,var(--blue-mid),var(--blue-deep));height:380px;display:flex;align-items:center;justify-content:center;box-shadow:var(--glass-shadow-lg);">
            <div style="text-align:center;color:white;">
              <div style="font-size:4rem;opacity:0.5;">🎼</div>
              <p style="color:rgba(255,255,255,0.5);font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;margin-top:8px;">Sacred Concerts</p>
            </div>
          </div>
          <div style="position:absolute;top:-16px;right:-16px;padding:16px 20px;background:var(--glass-bg-strong);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius-md);box-shadow:var(--glass-shadow);">
            <div style="font-size:1.5rem;font-family:var(--font-display);font-weight:300;color:var(--blue-primary);">24</div>
            <div style="font-size:0.65rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted);" data-i18n="stat_events"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ════════════════════════════════════════
       JOIN TEASER (CTA BAND)
  ════════════════════════════════════════ -->
  <section class="cta-band">
    <div class="container">
      <div style="display:inline-block;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:100px;padding:6px 20px;margin-bottom:20px;" class="reveal">
        <span class="label" style="color:rgba(255,255,255,0.65);" data-i18n="join_label"></span>
      </div>
      <h2 class="reveal reveal-delay-1" data-i18n="join_heading"></h2>
      <p class="reveal reveal-delay-2" data-i18n="join_body"></p>
      <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;" class="reveal reveal-delay-3">
        <a href="join.html" class="btn btn-white" data-i18n="join_cta"></a>
        <a href="join.html" style="color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:8px;font-size:0.85rem;font-weight:500;letter-spacing:0.05em;align-self:center;" data-i18n="join_link"></a>
      </div>
    </div>
  </section>

  <!-- Footer injected by components.js -->
  <div id="footer-placeholder"></div>

  <script src="js/translations.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
